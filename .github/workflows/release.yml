name: Release

# A semver tag drives the whole chain: a test gate, a coupling check, build, then
# PyPI publish via Trusted Publishing (OIDC, no stored tokens) and the anti-squat
# dex-core stub. The wrapper pins are bumped before tagging (scripts/
# prepare_release.sh), so this workflow never writes back; it only verifies the
# tagged commit is self-consistent before it publishes.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dex-core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # bigquery stays in the gate: the BigQuery safety families importorskip
      # on the client library, and a release gate that silently skips
      # safety-critical assertions is a hole, not a speedup.
      - name: Sync (duckdb + bigquery + dev extras)
        run: uv sync --extra duckdb --extra bigquery --extra dev
      - name: Tier-1 + safety-critical gate
        run: uv run pytest -q
      # A safety-assertion regression blocks the release regardless of pass-rate;
      # representative Tier-2 agent evals run here once they are wired into CI.

  # Read-only guard, run before publishing: the wrapper pins are bumped before
  # the tag (scripts/prepare_release.sh), so the tagged commit must already pin
  # the version this tag will publish. If it does not, the tag was cut without
  # running the prepare script, and shipping it would couple the plugin to the
  # wrong engine version (especially once the public catalog pins this tag), so
  # we fail before anything reaches PyPI. No writes, so branch protection is moot.
  verify-coupling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wrapper pins must match the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fail=0
          for skill in explore transform maintain; do
            f="skills/${skill}/scripts/run.py"
            if ! grep -qF "DEX_CORE_VERSION = \"${VERSION}\"" "$f"; then
              echo "${f} is not pinned to ${VERSION}:"
              grep -n "DEX_CORE_VERSION" "$f" || true
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "Run scripts/prepare_release.sh ${VERSION}, commit, and re-tag."
            exit 1
          fi
          echo "All wrapper pins match ${VERSION}."

  publish:
    needs: [gate, verify-coupling]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Job-level permissions REPLACE the top-level block, they do not merge, so
      # contents:read must be repeated here or checkout 404s with the token
      # holding only id-token:write.
      contents: read
      id-token: write  # OIDC for PyPI Trusted Publishing; no API tokens stored.
    defaults:
      run:
        working-directory: packages/dex-core
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the version from the tag; it needs full history
          # and the tags, which the default shallow checkout omits.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Assert built version matches the tag
        # Hard stop against the version-drift class of bug: if hatch-vcs fell
        # back (or the tag was unreadable), the wheel would not carry the tag
        # version and we must not publish it.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! ls dist/exmergo_dex_core-"${VERSION}"-*.whl >/dev/null 2>&1; then
            echo "Built artifacts do not match tag version ${VERSION}:"
            ls -1 dist/
            exit 1
          fi
      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish
      # Optionally emit PEP 740 / Sigstore attestations for provenance.

  # Anti-squat: claim and hold the short name `dex-core`, which redirects users to
  # exmergo-dex-core. This is a one-time reservation, so it must be idempotent
  # across releases. `uv publish --check-url` does NOT achieve that: it skips a
  # file only when the remote copy is byte-identical, and a rebuilt static-version
  # (0.0.0) stub wheel is not reproducible, so its hash differs from the copy
  # published on the first release and uv errors ("Local file and index file do
  # not match") instead of skipping. So we gate on whether the project already
  # exists on PyPI and no-op if it does. Needs its own PyPI Trusted Publisher for
  # the `dex-core` project, with a DISTINCT environment (pypi-stub): PyPI rejects
  # two pending publishers that share an identical owner/repo/workflow/environment,
  # so the engine job uses `pypi` and this one uses `pypi-stub`.
  reserve-dex-core:
    needs: publish
    runs-on: ubuntu-latest
    environment: pypi-stub
    permissions:
      contents: read  # see the publish job: job-level permissions replace, not merge.
      id-token: write
    defaults:
      run:
        working-directory: packages/dex-core-stub
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Reserve dex-core on PyPI (once; no-op if the name already exists)
        run: |
          # Publish only on a definite 404 (name not yet reserved). On 200 the
          # name is already held, so skip. On any other response (network/5xx)
          # skip too, rather than risk the non-idempotent publish path above.
          code=$(curl -s -o /dev/null -w '%{http_code}' https://pypi.org/pypi/dex-core/json)
          case "$code" in
            200) echo "dex-core is already reserved on PyPI; nothing to do."; exit 0 ;;
            404) echo "dex-core not found on PyPI; building and publishing the stub." ;;
            *)   echo "Unexpected HTTP ${code} from PyPI; skipping to avoid a bad publish."; exit 0 ;;
          esac
          uv build
          uv publish
