name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Ruff lints and format-checks every Python tree in the repo from the root,
  # governed by ruff.toml. This gate must pass before a PR can merge into main.
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff lint
        run: uvx ruff@0.15.19 check --output-format=github .
      - name: Ruff format check
        run: uvx ruff@0.15.19 format --check --diff .
