name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Tier 1: engine correctness + the safety-critical assertions. Deterministic,
  # fast, free (DuckDB is the test engine). The always-on release gate.
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/dex-core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # The cloud extras are included so their unit tests and safety families
      # run here (they are offline against fake clients, but they importorskip
      # on the client libraries; without the extras they would silently skip).
      - name: Sync (duckdb + bigquery + snowflake + databricks + postgres + redshift + dev extras)
        run: uv sync --extra duckdb --extra bigquery --extra snowflake --extra databricks --extra postgres --extra redshift --extra dev --python ${{ matrix.python-version }}
      - name: Tier-1 unit tests
        run: uv run pytest -q

  # The safety spine is broken out as its own gate so a regression on a
  # safety-critical assertion is unmistakable in the checks list. Strict: an
  # unexpected pass (a placeholder going green early) is fine; a real
  # failure blocks the merge regardless of any benchmark score.
  safety:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dex-core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (duckdb + bigquery + snowflake + databricks + postgres + redshift + dev extras)
        run: uv sync --extra duckdb --extra bigquery --extra snowflake --extra databricks --extra postgres --extra redshift --extra dev
      - name: Safety-critical assertions
        run: uv run pytest -q tests/test_safety_spine.py

  # The Tier-2 eval harness scoring core (triggering, output-quality, uplift math),
  # exercised with fake backends: deterministic, free, no model in the loop. The
  # live Claude-driven evals run on release, not here. Stdlib only, so uvx supplies
  # pytest and the harness needs no install.
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Eval scoring-core tests
        run: uvx pytest evals -q

  # On brand for Exmergo (easter egg): all shipped prose is em-dash free.
  em-dashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Repo prose must be em-dash clean
        run: |
          git ls-files '*.md' '*.mdc' '*.txt' \
            | xargs python scripts/check_no_em_dashes.py
