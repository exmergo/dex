name: Integration

# Live cloud connectors, authenticated via workload identity federation (OIDC,
# no stored keys, matching the release workflow's Trusted Publishing stance).
# Deliberately NOT a merge or release gate: ci.yml stays deterministic and
# fork-runnable; this workflow answers "does the connector still work against
# the real service" on main and on a schedule. Each suite reads shared/public
# sample data, writes only to its scratch scope, and caps every statement
# (bytes on BigQuery, seconds on Snowflake, Databricks, and Postgres), so a
# worst-case run costs cents.
#
# One-time setup (documented in CONTRIBUTING.md):
#   BigQuery: scripts/setup_bigquery_ci.sh (Workload Identity Pool provider
#   pinned to this repo + environment; service account with jobUser on the
#   project and dataEditor on the scratch dataset only).
#   Snowflake: scripts/setup_snowflake_ci.sh (a SERVICE user whose
#   WORKLOAD_IDENTITY accepts only GitHub OIDC tokens minted for this repo's
#   snowflake-integration environment; a least-privilege role on the pinned
#   X-Small warehouse and the transient scratch database; a resource monitor
#   as the hard monthly cost backstop).
#   Databricks: scripts/setup_databricks_ci.sh (a service principal whose
#   account-level federation policy accepts only GitHub OIDC tokens minted for
#   this repo's databricks-integration environment; CAN USE on a dedicated
#   2X-Small serverless warehouse with minimum auto-stop; read on samples,
#   write only in the scratch catalog. No resource-monitor analogue exists, so
#   the backstop is the smallest warehouse, auto-stop, per-statement
#   STATEMENT_TIMEOUT, and a workspace budget alert).
#   Postgres: no setup at all. The operational-database connector runs against
#   a service container seeded from scripts/postgres_seed.sql (the same seed
#   scripts/setup_postgres_dev.sh applies locally): free, keyless, and
#   fork-runnable by construction, kept here for pattern parity with the other
#   connectors rather than as a cost decision.
on:
  push:
    branches: [main]
    paths:
      - "packages/dex-core/**"
      - ".github/workflows/integration.yml"
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# One run at a time: the scratch scopes are shared, and serializing runs caps
# worst-case concurrent spend.
concurrency:
  group: cloud-integration
  cancel-in-progress: false

jobs:
  bigquery:
    # Forks have a different repository name, so they skip here; a fork can run
    # the same suite against its own GCP project via the DEX_TEST_BQ_* env.
    if: github.repository == 'exmergo/dex'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The environment carries the GCP variables and, via its deployment branch
    # policy (main only), refuses this job to a workflow modified on a branch
    # before the auth step can run. Same posture as the release workflow's
    # pypi/pypi-stub environments.
    environment: gcp-integration
    permissions:
      contents: read
      id-token: write # OIDC for Workload Identity Federation; no stored keys.
    defaults:
      run:
        working-directory: packages/dex-core
    env:
      DEX_TEST_BQ_PROJECT: ${{ vars.DEX_TEST_BQ_PROJECT }}
      DEX_TEST_BQ_DATASET: dex_ci
      DEX_TEST_BQ_MAX_BYTES: "104857600" # 100 MB per query
    steps:
      - uses: actions/checkout@v4
      # Exports Application Default Credentials (credential file plus
      # GOOGLE_APPLICATION_CREDENTIALS/GOOGLE_CLOUD_PROJECT), which is exactly
      # the discovery path the engine uses: no CI special-casing anywhere.
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_INTEGRATION_SA }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (bigquery + duckdb + dev extras)
        run: uv sync --extra bigquery --extra duckdb --extra dev
      - name: Live BigQuery integration suite
        run: uv run pytest tests/integration -q -m bigquery

  snowflake:
    if: github.repository == 'exmergo/dex'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The environment carries the Snowflake variables and, via its deployment
    # branch policy (main only), refuses this job to a workflow modified on a
    # branch before the token is minted. The Snowflake-side pin mirrors it:
    # the DEX_CI service user accepts only tokens whose subject names this
    # repo + environment.
    environment: snowflake-integration
    permissions:
      contents: read
      id-token: write # OIDC for Snowflake workload identity; no stored keys.
    defaults:
      run:
        working-directory: packages/dex-core
    env:
      DEX_TEST_SNOWFLAKE_DATABASE: DEX_CI
      DEX_TEST_SNOWFLAKE_WAREHOUSE: DEX_CI_WH
      DEX_TEST_SNOWFLAKE_MAX_SECONDS: "60"
      SNOWFLAKE_ACCOUNT: ${{ vars.DEX_TEST_SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.DEX_TEST_SNOWFLAKE_USER }}
      SNOWFLAKE_AUTHENTICATOR: WORKLOAD_IDENTITY
      SNOWFLAKE_WORKLOAD_IDENTITY_PROVIDER: OIDC
    steps:
      - uses: actions/checkout@v4
      # Mint the GitHub OIDC token Snowflake validates (audience pinned to
      # what the service user's OIDC_AUDIENCE_LIST expects) and hand it to the
      # connector through the same SNOWFLAKE_* discovery path the engine uses
      # everywhere: no CI special-casing.
      - name: Mint GitHub OIDC token for Snowflake
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('snowflakecomputing.com')
            core.setSecret(token)
            core.exportVariable('SNOWFLAKE_TOKEN', token)
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (snowflake + duckdb + dev extras)
        run: uv sync --extra snowflake --extra duckdb --extra dev
      # Keyless: connect, explore, and the transform tests' own skip guard all
      # run on the workload identity above. The transform tests skip themselves
      # here (dbt cannot authenticate that way) and run in the next step.
      - name: Live Snowflake integration suite
        run: uv run pytest tests/integration -q -m snowflake
      # The one step that cannot be keyless. dbt-snowflake's profile has no
      # workload-identity provider field, so `transform init` refuses to render
      # a WIF profile and these tests need a durable credential: a key pair on
      # a separate service user holding the same least-privilege role, so the
      # blast radius is unchanged (read the samples, write the transient
      # scratch database) and DEX_CI itself stays keyless. The secret is
      # readable only by this environment, whose deployments are pinned to
      # main, so a pull request cannot reach it. Emptying SNOWFLAKE_TOKEN and
      # the WIF provider is what makes discovery pick the key pair rather than
      # the token the job already minted.
      - name: Live Snowflake transform suite (dbt, key pair)
        env:
          SNOWFLAKE_USER: ${{ vars.DEX_TEST_SNOWFLAKE_DBT_USER }}
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_WORKLOAD_IDENTITY_PROVIDER: ""
          SNOWFLAKE_TOKEN: ""
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.DEX_TEST_SNOWFLAKE_PRIVATE_KEY }}
        run: |
          # Without these the suite reads Snowflake as "not configured" and
          # skips itself green, which is the one failure mode this step exists
          # to prevent. Refuse instead: the credential comes from the setup
          # script, so a missing one means it has not been re-run.
          if [ -z "$SNOWFLAKE_USER" ] || [ -z "$SNOWFLAKE_PRIVATE_KEY" ]; then
            echo "::error::DEX_TEST_SNOWFLAKE_DBT_USER or DEX_TEST_SNOWFLAKE_PRIVATE_KEY is missing from the snowflake-integration environment; re-run scripts/setup_snowflake_ci.sh"
            exit 1
          fi
          key="${RUNNER_TEMP}/snowflake_ci_dbt_key.p8"
          install -m 600 /dev/null "$key"
          printf '%s' "$SNOWFLAKE_PRIVATE_KEY" > "$key"
          trap 'rm -f "$key"' EXIT
          SNOWFLAKE_PRIVATE_KEY_FILE="$key" \
            uv run pytest tests/integration/test_snowflake_transform.py -q -m snowflake

  databricks:
    if: github.repository == 'exmergo/dex'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The environment carries the Databricks variables and, via its deployment
    # branch policy (main only), refuses this job to a workflow modified on a
    # branch before the token is minted. The Databricks-side pin mirrors it:
    # the service principal's federation policy accepts only tokens whose
    # subject names this repo + environment.
    environment: databricks-integration
    permissions:
      contents: read
      id-token: write # OIDC for the federation-policy token exchange; no stored keys.
    defaults:
      run:
        working-directory: packages/dex-core
    env:
      DATABRICKS_HOST: ${{ vars.DEX_TEST_DATABRICKS_HOST }}
      DEX_TEST_DATABRICKS_WAREHOUSE: ${{ vars.DEX_TEST_DATABRICKS_WAREHOUSE }}
      DEX_TEST_DATABRICKS_CATALOG: ${{ vars.DEX_TEST_DATABRICKS_CATALOG }}
      DEX_TEST_DATABRICKS_MAX_SECONDS: "60"
    steps:
      - uses: actions/checkout@v4
      # Exchange the GitHub OIDC token for a Databricks OAuth token through
      # the service principal's federation policy, then hand it to the engine
      # and dbt through the same DATABRICKS_TOKEN discovery path a PAT would
      # use: no CI special-casing anywhere downstream.
      - name: Exchange GitHub OIDC token for a Databricks token
        uses: actions/github-script@v7
        with:
          script: |
            const githubToken = await core.getIDToken(process.env.DATABRICKS_HOST)
            const response = await fetch(`${process.env.DATABRICKS_HOST}/oidc/v1/token`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: new URLSearchParams({
                client_id: '${{ vars.DEX_TEST_DATABRICKS_CLIENT_ID }}',
                grant_type: 'urn:ietf:params:oauth:grant-type:token-exchange',
                scope: 'all-apis',
                subject_token_type: 'urn:ietf:params:oauth:token-type:jwt',
                subject_token: githubToken,
              }),
            })
            if (!response.ok) {
              core.setFailed(`token exchange failed: ${response.status} ${await response.text()}`)
              return
            }
            const token = (await response.json()).access_token
            core.setSecret(token)
            core.exportVariable('DATABRICKS_TOKEN', token)
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (databricks + duckdb + dev extras)
        run: uv sync --extra databricks --extra duckdb --extra dev
      - name: Live Databricks integration suite
        run: uv run pytest tests/integration -q -m databricks

  postgres:
    # No repository gate and no environment: the target is a job-local service
    # container, so there is nothing to authenticate against and nothing a
    # fork could spend.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/dex-core
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DEX_TEST_PG_DSN: postgresql://dex_ro:dex_ro@localhost:5432/dex_dogfood
      DEX_TEST_PG_DEV_PASSWORD: dbt_dev
    steps:
      - uses: actions/checkout@v4
      # The same seed the local dogfood container uses; psql ships on
      # ubuntu-latest runners.
      - name: Seed the service container
        working-directory: .
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -v ON_ERROR_STOP=1 \
            -c "DROP DATABASE IF EXISTS dex_dogfood WITH (FORCE)" \
            -c "CREATE DATABASE dex_dogfood"
          PGPASSWORD=postgres psql -h localhost -U postgres -d dex_dogfood \
            -v ON_ERROR_STOP=1 -f scripts/postgres_seed.sql
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (postgres + duckdb + dev extras)
        run: uv sync --extra postgres --extra duckdb --extra dev
      - name: Live Postgres integration suite
        run: uv run pytest tests/integration -q -m postgres
