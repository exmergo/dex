[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Anti-squat placeholder that reserves the short name `dex-core` on PyPI and
# points users at the real distribution, `exmergo-dex-core`. It ships no working
# code on purpose. The version is independent of the engine and rarely changes;
# the release workflow publishes it idempotently (uv publish --check-url), so the
# name is claimed on the first release and the upload is skipped on every release
# after.
[project]
name = "dex-core"
version = "0.0.0"
description = "Reserved by Exmergo. The dex engine is published as 'exmergo-dex-core'."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Exmergo, Inc.", email = "support@exmergo.com" }]
keywords = ["dex", "exmergo", "exmergo-dex-core", "analytics-engineering", "placeholder"]

[project.urls]
Homepage = "https://www.exmergo.com/dex"
Repository = "https://github.com/exmergo/dex"

[tool.hatch.build.targets.wheel]
packages = ["dex_core"]
