# Ruff lints and formats every Python tree in the monorepo (the engine under
# packages/, the PEP 723 skill wrappers under skills/, and the helper scripts).
# It is run from the repo root so a single config governs all of them; Ruff's
# upward config discovery means editor and pre-commit invocations find it too.

target-version = "py311"
line-length = 88

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "SIM",  # flake8-simplify
  "N",    # pep8-naming
  "S",    # flake8-bandit (security)
  "PTH",  # flake8-use-pathlib
  "PERF", # perflint
  "RUF",  # Ruff-specific rules
]
# UP042 (replace-str-enum) would rewrite the `(str, Enum)` wire-format enums to
# StrEnum, which changes their `str()` output and risks the serialized envelope.
# That is a deliberate engine decision, not a side effect of adopting a linter.
ignore = ["UP042"]

[lint.per-file-ignores]
# Tests: assert is the pytest idiom (S101), and the safety-spine tests
# deliberately assert that *any* exception is raised on a refused write (B017).
"packages/dex-core/tests/**" = ["S101", "B017"]
# The skill wrappers shell out to the pinned dex CLI by design; the command is
# a fixed path plus an argv passthrough, not untrusted input (S603).
"skills/**/scripts/run.py" = ["S603"]

[lint.isort]
known-first-party = ["exmergo_dex_core"]
